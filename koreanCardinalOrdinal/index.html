<!doctype html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=2">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">

	<title>Cardinal Ordinal test</title>
</head>
<body>
<div id="container">
	<input type="number" v-model="numeric">
	<p>{{ordinary}}</p>
	<p>{{cardinary}}</p>
</div>

<script src="/require/xeno/fmt.ordinal.min.js"></script>
<script src="https://unpkg.com/vue@3.0.0/dist/vue.global.prod.js"></script>
<script>
	(function(w, d, undefined) {
		Vue.createApp({
			data() { return {numeric:"28372346"}; },
			computed: {
				ordinary: function() {
					return FmtOrdinal.toOrdinal(this.numeric);
				},
				cardinary: function() {
					return FmtOrdinal.toCardinal(this.numeric);
				}
			}
		}).mount('#container');
	})(window, document);
</script>

<hr>
<a href="requirejs.html">require.js example</a>
</body>
</html>
